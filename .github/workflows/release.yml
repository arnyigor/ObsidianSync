name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Run checks
        shell: pwsh
        run: .\gradlew.bat clean check --no-daemon
      - name: Build portable application
        shell: pwsh
        run: .\gradlew.bat :desktopApp:createDistributable --no-daemon
      - name: Build native packages
        shell: pwsh
        run: .\gradlew.bat :desktopApp:packageDistributionForCurrentOS --no-daemon
      - name: Collect Desktop assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $appRoot = Get-ChildItem desktopApp/build/compose/binaries/main/app -Directory | Select-Object -First 1
          if ($null -eq $appRoot) { throw "Portable Desktop application was not produced" }
          Compress-Archive -Path $appRoot.FullName -DestinationPath release-assets/ObsiDelta-Sync-Windows-portable.zip
          Get-ChildItem desktopApp/build/compose/binaries/main -Recurse -File -Include *.exe,*.msi |
            Where-Object { $_.FullName -notmatch '[\\/]app[\\/]' } |
            Copy-Item -Destination release-assets
      - uses: actions/upload-artifact@v7
        with:
          name: release-desktop
          path: release-assets/*
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/obsidelta-release.jks
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Restore Android signing key
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "ANDROID_KEYSTORE_BASE64 is not configured"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "ANDROID_KEYSTORE_PASSWORD is not configured"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "ANDROID_KEY_ALIAS is not configured"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "ANDROID_KEY_PASSWORD is not configured"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
      - name: Build signed APK and Android App Bundle
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease --no-daemon
      - name: Collect Android assets
        shell: bash
        run: |
          mkdir -p release-assets
          find androidApp/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -exec cp {} release-assets/ \;
      - uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: release-assets/*
          if-no-files-found: error

  ios:
    name: iOS simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build unsigned iOS simulator application
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Collect iOS asset
        shell: bash
        run: |
          mkdir -p release-assets
          APP_PATH="$(find build/ios/Build/Products/Release-iphonesimulator -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$APP_PATH" || { echo "iOS application was not produced"; exit 1; }
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" release-assets/ObsiDelta-Sync-iOS-Simulator.zip
      - uses: actions/upload-artifact@v7
        with:
          name: release-ios
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [desktop, android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create or update release
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes
          find release-assets -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --clobber
